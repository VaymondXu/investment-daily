name: 投资日报

on:
  # 每天北京时间 06:09 自动触发，A 股开盘前早读（UTC+8 → UTC 前一天 22:09，UTC 周日-周四对应北京周一-周五）
  schedule:
    - cron: "9 22 * * 0-4"

  # 手动触发（GitHub Actions 页面点 "Run workflow"）
  workflow_dispatch:
    inputs:
      reason:
        description: "手动触发原因（可选）"
        required: false
        default: "手动触发"

jobs:
  generate-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate & push daily report
        env:
          DEEPSEEK_API_KEY:  ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: python daily_report.py
